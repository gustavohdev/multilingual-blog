name: Deploy to Vercel

on:
  push:
    branches:
      - main # Triggers deployment when code is pushed to the 'main' branch
      - devblog # Triggers deployment when code is pushed to the 'main' branch
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "18" # Specify the Node.js version you want to use

      - name: Install dependencies
        run: yarn

      - name: Build project
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_ASSETS_URL: ${{ secrets.NEXT_PUBLIC_ASSETS_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: yarn build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }} # Pulls Vercel token from GitHub secrets
        run: npx vercel --prod --token $VERCEL_TOKEN
